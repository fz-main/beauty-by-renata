<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Beauty by Renata</title>
    <script>
      // GitHub Pages SPA redirect - preserves /beauty-by-renata/ prefix
      var repo = '/beauty-by-renata';
      var l = window.location;
      var path = l.pathname;
      // If path doesn't start with repo, redirect to repo root
      if (path.indexOf(repo) !== 0) {
        l.replace(repo + '/');
        return;
      }
      // Strip repo prefix, keep the rest as the SPA path
      var spaPath = path.slice(repo.length) || '/';
      var query = l.search ? l.search : '';
      var hash = l.hash || '';
      l.replace(repo + '/?/' + spaPath.slice(1).replace(/\//g, '~') + query + hash);
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
