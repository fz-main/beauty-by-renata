    <script>
      // GitHub Pages SPA redirect
      // Restores real URL from 404.html encoded query params
      (function(l) {
        if (l.search && l.search.length > 1) {
          var path = l.search.slice(1).replace(/~and~/g, '&');
          history.replaceState(null, null, l.pathname + path + l.hash);
        }
      })(window.location);
    </script>
