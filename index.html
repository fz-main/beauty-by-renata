    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/beauty-by-renata/favicon.svg" />

    <meta name="description" content="Profesionální kosmetická ošetření v Brně: mikrojehličkování, chemický peeling, kosmetická ošetření, maderoterapie" />
    <title>Beauty by Renata – Kosmetické studio Brno</title>
    <script>
      // GitHub Pages SPA redirect
      (function() {
        var search = window.location.search;
        if (search && search.length > 1) {
          // Remove leading ? and restore ~ to &
          var path = search.slice(1).replace(/~and~/g, '&');
          // Ensure no double slashes
          var base = window.location.pathname.replace(/\/+$/, '');
          history.replaceState(null, '', base + path + window.location.hash);
        }
      })();
    </script>
    <script type="module" crossorigin src="/beauty-by-renata/assets/app.js"></script>
    <link rel="stylesheet" crossorigin href="/beauty-by-renata/assets/app.css">
  </head>

  </body>
</html>
